name: Backfill People (TEMPORARY)
# TODO: Disable this workflow once all 3,747 people appear on the site.
# Check progress at: https://castrojo.github.io/people-website/
# When done: Settings → Actions → Workflows → disable this workflow.

on:
  schedule:
    - cron: "0 * * * *"  # hourly until backfill is complete
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: people-go/go.sum

      - name: Restore sync cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sync-cache
            src/data
          key: sync-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: sync-cache-${{ runner.os }}-

      - name: Sync people data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd people-go
          go build -o people cmd/people/main.go
          ./people

      - name: Save sync cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .sync-cache
            src/data
          key: sync-cache-${{ runner.os }}-${{ github.run_id }}
          retention-days: 90
