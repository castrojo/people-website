name: Build and Push Container

on:
  push:
    branches:
      - main
  schedule:
    # Daily at 9 AM UTC (after Pages build)
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ghcr.io/castrojo/people-website:latest
            ghcr.io/castrojo/people-website:${{ github.sha }}
