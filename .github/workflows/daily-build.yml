name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * *"       # daily at 7 AM UTC
    - cron: "0 */3 * * 1"     # every 3 hours on Mondays (preseeding)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: people-go/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Restore sync cache
        uses: actions/cache/restore@v4
        with:
          path: .sync-cache
          key: sync-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: sync-cache-${{ runner.os }}-

      - name: Build Go pipeline (sync people data)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd people-go
          go build -o people cmd/people/main.go
          ./people
          mkdir -p ../public/data
          cp ../src/data/changelog.json ../public/data/changelog.json
          cp ../src/data/maintainers.json ../public/data/maintainers.json
          cp ../src/data/landscape_logos.json ../public/data/landscape_logos.json 2>/dev/null || true
          ls -lh ../src/data/changelog.json

      - name: Save sync cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .sync-cache
          key: sync-cache-${{ runner.os }}-${{ github.run_id }}
          retention-days: 90

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
