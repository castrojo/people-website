server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    # text/html is always included by nginx — omit to avoid duplicate MIME type warning
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;

    # Long-lived cache for fingerprinted Astro assets
    location ~* \.(css|js|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
